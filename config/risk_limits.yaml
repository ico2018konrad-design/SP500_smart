# SP500 Smart Scalper Bot — Risk Limits & Circuit Breakers

# ─── PER TRADE ───────────────────────────────────────────────────
per_trade:
  base_risk_pct: 0.015        # 1.5% default
  min_risk_pct: 0.005
  max_risk_pct: 0.020         # hard cap 2%

  # Dynamic risk per regime
  regime_risk:
    STRONG_BULL: 0.020
    BULL: 0.015
    CHOP: 0.010
    CAUTION: 0.005
    BEAR: 0.010  # short only

  # Performance adjustment
  win_rate_low_threshold: 0.40
  win_rate_low_multiplier: 0.50
  win_rate_high_threshold: 0.70
  win_rate_high_multiplier: 1.20
  performance_lookback: 5     # last 5 trades

# ─── DAILY LIMITS ────────────────────────────────────────────────
daily:
  max_loss_pct: 0.03          # -3% → halt till next day
  max_consecutive_losses: 3   # → 4 hour cooldown
  cooldown_hours: 4

# ─── WEEKLY LIMITS ───────────────────────────────────────────────
weekly:
  max_loss_pct: 0.07          # -7% → halt until Monday

# ─── MONTHLY LIMITS ──────────────────────────────────────────────
monthly:
  max_drawdown_pct: 0.12      # -12% → bot OFF 14 days
  bot_off_days: 14

# ─── SYSTEMIC CIRCUIT BREAKERS ───────────────────────────────────
systemic:
  vix_flat_leveraged_threshold: 40    # VIX > 40 flat all leveraged
  spy_flash_crash_pct: -0.02          # SPY -2% in 1 hour → FLAT ALL
  spy_panic_pct: -0.05                # SPY -5% in day → panic mode
  api_error_max_retries: 3
  api_error_failsafe: true            # on persistent error: close all
  kill_switch_enabled: true

# ─── SHORT POSITION LIMITS ───────────────────────────────────────
short:
  max_size_pct: 0.333         # 1/3 of normal long size
  instruments: ["SPXS", "SH"] # NO naked shorts
  min_rr: 1.5

# ─── POSITION LIMITS ─────────────────────────────────────────────
position:
  max_concurrent: 6
  max_leverage_mini: 2.5
  max_leverage_full: 2.5
  max_single_instrument_pct: 0.60

# ─── BACKTEST REALISM ────────────────────────────────────────────
backtest:
  commission_pct: 0.0005      # 0.05% per trade (IBKR)
  slippage_pct: 0.001         # 0.1% slippage estimate
  upro_borrow_fee_annual: 0.0095   # UPRO ~0.95% annual borrow
  spxs_borrow_fee_annual: 0.0180   # SPXS ~1.8% annual borrow
  sh_borrow_fee_annual: 0.0035     # SH ~0.35% annual borrow
  vxx_borrow_fee_annual: 0.0100    # VXX ~1% annual borrow
  spy_expense_ratio: 0.00095       # SPY 0.095% annual
  upro_expense_ratio: 0.00930      # UPRO 0.93% annual
  sh_expense_ratio: 0.00890        # SH 0.89% annual
  spxs_expense_ratio: 0.01080      # SPXS 1.08% annual
